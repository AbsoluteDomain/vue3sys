services:
  mysql:
    image: mysql:8.0.29
    container_name: youlai-django-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=youlai_admin_django
    ports:
      - "3306:3306"
    volumes:
      - youlai_django_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2.3
    container_name: youlai-django-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "123456", "--appendonly", "no"]
    environment:
      - TZ=Asia/Shanghai
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: youlai-django-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - TZ=Asia/Shanghai
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - youlai_django_minio_data:/data

  web:
    build: .
    container_name: youlai-django-web
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  youlai_django_mysql_data:
  youlai_django_minio_data:
